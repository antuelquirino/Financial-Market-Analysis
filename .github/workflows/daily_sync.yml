name: Daily Financial Data Sync

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas yfinance google-cloud-bigquery pandas-gbq db-dtypes dbt-bigquery

      - name: Run Daily Price Extraction
        env:

          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }} 
        run: python extraction/daily_update.py

      - name: Run dbt transformation
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          # Creamos el archivo gcp_key.json usando Python para asegurar formato perfecto
          python -c "import os, json; f=open('gcp_key.json', 'w'); json.dump(json.loads(os.environ['GCP_SA_KEY']), f)"
          
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          market_pipeline:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: financial-market-analysis
                dataset: analytics_finance
                threads: 4
                keyfile: $(pwd)/gcp_key.json
                priority: interactive
          EOF
          
          cd dbt_project
          dbt deps
          dbt run