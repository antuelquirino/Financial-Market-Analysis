name: Daily Financial Data Sync

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas yfinance google-cloud-bigquery pandas-gbq db-dtypes dbt-bigquery

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          create_credentials_file: true

      - name: Setup Environment
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }}" >> $GITHUB_ENV
          cp ${{ steps.auth.outputs.credentials_file_path }} gcp_key.json

      - name: Run Daily Price Extraction
        run: python extraction/daily_update.py

      - name: Run dbt transformation
        env:
          DBT_KEYFILE: ${{ github.workspace }}/gcp_key.json
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          market_pipeline:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: financial-market-analysis
                dataset: analytics_finance
                threads: 4
                keyfile: $DBT_KEYFILE
                priority: interactive
          EOF
          cd dbt_project
          dbt deps
          dbt run